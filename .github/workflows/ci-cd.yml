name: CI/CD

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Check lint
        run: uv run ruff check

      - name: Check format
        run: uv run ruff format --check

      - name: Type check
        run: uv run basedpyright

      - name: Test
        run: uv run pytest

  build_publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      ROLE_TO_ASSUME: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
    outputs:
      s3_key: ${{ steps.bundle.outputs.s3_key }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare deployment bundle
        id: bundle
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          OBJECT_KEY="psycho-pickle-${COMMIT_SHA}.zip"
          mkdir -p deploy
          cp -r app deploy/
          cp pyproject.toml uv.lock deploy/
          cp appspec.yml pickle.service deploy/
          cp -r scripts deploy/
          chmod +x deploy/scripts/*.sh
          for script in deploy/scripts/*.sh; do
            test -x "$script"
          done
          cd deploy && zip -r "../${OBJECT_KEY}" .
          echo "s3_key=${OBJECT_KEY}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish artifact to S3
        env:
          S3_KEY: ${{ steps.bundle.outputs.s3_key }}
        run: |
          if aws s3api head-object \
            --bucket "${S3_BUCKET}" \
            --key "${S3_KEY}" > /dev/null 2>&1; then
            echo "Artifact already exists. Skipping upload: ${S3_KEY}"
          else
            aws s3 cp "${S3_KEY}" "s3://${S3_BUCKET}/${S3_KEY}"
          fi

  deploy:
    needs: build_publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      CODEDEPLOY_APPLICATION: ${{ secrets.CODEDEPLOY_APPLICATION }}
      CODEDEPLOY_DEPLOYMENT_GROUP: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP }}
      ROLE_TO_ASSUME: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
      S3_KEY: ${{ needs.build_publish.outputs.s3_key }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create CodeDeploy deployment
        env:
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APPLICATION}" \
            --deployment-group-name "${CODEDEPLOY_DEPLOYMENT_GROUP}" \
            --s3-location "bucket=${S3_BUCKET},key=${S3_KEY},bundleType=zip" \
            --description "Deploy ${COMMIT_SHA} from ${REF_NAME}" \
            --query 'deploymentId' \
            --output text)
          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        run: |
          aws deploy wait deployment-successful \
            --deployment-id $DEPLOYMENT_ID

      - name: Get deployment result
        if: always()
        run: |
          aws deploy get-deployment \
            --deployment-id $DEPLOYMENT_ID \
            --query 'deploymentInfo.{Status:status,Description:description}' \
            --output table

      - name: Get deployment diagnostics
        if: failure()
        run: |
          echo "=== CodeDeploy diagnostics for ${DEPLOYMENT_ID} ==="
          DEPLOYMENT_STATUS=$(aws deploy get-deployment \
            --deployment-id "${DEPLOYMENT_ID}" \
            --query 'deploymentInfo.status' \
            --output text || echo "UNKNOWN")

          echo "Deployment status: ${DEPLOYMENT_STATUS}"
          if [ "${DEPLOYMENT_STATUS}" = "FAILED" ]; then
            aws deploy get-deployment \
              --deployment-id "${DEPLOYMENT_ID}" \
              --query 'deploymentInfo.{Status:status,ErrorCode:errorInformation.code,ErrorMessage:errorInformation.message,Overview:deploymentOverview}' \
              --output table || true
          fi

          INSTANCE_IDS=$(aws deploy list-deployment-instances \
            --deployment-id "${DEPLOYMENT_ID}" \
            --query 'instancesList' \
            --output text || true)

          if [ -z "${INSTANCE_IDS}" ] || [ "${INSTANCE_IDS}" = "None" ]; then
            echo "No deployment instances found."
            exit 0
          fi

          for id in ${INSTANCE_IDS}; do
            echo "--- Instance: ${id} ---"
            aws deploy get-deployment-instance \
              --deployment-id "${DEPLOYMENT_ID}" \
              --instance-id "${id}" \
              --query 'instanceSummary.{Status:status,LastErrorCode:lastErrorCode,LastErrorMessage:lastErrorMessage}' \
              --output table || true
          done
